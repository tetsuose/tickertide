# Secrets & Assets Inventory — Example Template
#
# Purpose
#   Keep a single human-readable checklist of operational assets (domains, hosts,
#   accounts) and sensitive credentials (tokens, API keys, passwords) for one project.
#
# Storage rule
#   - This file (the .example.yaml) lives in git as a template only.
#   - The real inventory MUST NOT be committed. Place it outside the repo or under
#     a git-ignored path such as `deployment/ops/secrets/secrets-inventory.yaml`.
#   - Treat the real inventory as sensitive even when redacted. Store it only in
#     encrypted disks or a password manager.
#
# How to maintain
#   1. Copy this file to a safe, git-ignored location and rename to secrets-inventory.yaml.
#   2. Populate real values. Keep a backup copy in your password manager.
#   3. Record issue time, owner, and rotation note on every credential.
#   4. When a key is revoked, mark it `revoked: true` and keep the line for audit.
#
# Sections below are illustrative shapes only. Add or remove sections to match
# the actual surfaces of your project. The point is one file, one schema, one
# rotation timeline.

meta:
  owner: <operator-identifier>
  updated_at: <YYYY-MM-DDTHH:MM:SSZ>
  storage: local-file       # keep outside git
  notes: |
    Real inventory location: <path on operator workstation or encrypted vault>
    Backup location:         <password manager entry name>

# ---------------------------------------------------------------------------
# Asset surfaces (no secrets here, just identifiers and routing facts)
# ---------------------------------------------------------------------------

domains:
  - role: <e.g. portal, api, subscription, status-page>
    fqdn: <example.invalid>
    dns_provider: <provider-name>
    ttl_policy: <e.g. 300s rolling, 86400s for apex>

hosts:
  - role: <e.g. control-plane, worker, ingress>
    address: <ip-or-hostname>
    provider: <hosting-provider>
    region: <region-code>
    aliases:
      - <alt-hostname-1>
      - <alt-hostname-2>

contacts:
  from_address: <noreply@example.invalid>
  support_inbox: <support@example.invalid>
  admin_inbox: <admin@example.invalid>

# ---------------------------------------------------------------------------
# Credential surfaces (real values go in the real inventory, NOT this template)
# ---------------------------------------------------------------------------

application:
  # Application-level secrets (database, cache, app key) owned by the runtime.
  database:
    host: <127.0.0.1>
    user: <db-user>
    password: "<SECRET>"
    issued_at: <YYYY-MM-DD>
    next_due: <YYYY-MM-DD>
  cache:
    host: <127.0.0.1>
    password: "<SECRET>"
    issued_at: <YYYY-MM-DD>
  app_key: "<SECRET>"

third_party_providers:
  # One block per provider. Each provider has its own rotation runbook.
  - name: <payment-provider>
    keys:
      - env_key: <ENV_KEY_NAME>
        value: "<SECRET>"
        scope: <e.g. publishable, secret, webhook>
        issued_at: <YYYY-MM-DD>
        next_due: <YYYY-MM-DD>
        rotation_runbook: <path/to/runbook.md>
    # If this provider's credential lives in two backends (rare but real),
    # list both backends and the rotation runbook that enforces atomic update.
    dual_backend:
      enabled: false
      backends:
        - name: <primary-store>
          path_or_id: <path or secret id>
          consumers: [<consumer-1>]
        - name: <secondary-store>
          path_or_id: <path or secret id>
          consumers: [<consumer-2>]
      rotation_runbook: <path/to/dual-backend-runbook.md>

per_host_credentials:
  # Credentials that are scoped to one host or one host class.
  # Examples: per-host API keys, per-host certificates, per-host signing keypairs.
  - host_role: <e.g. ingress-jp1>
    env_keys: [<ENV_KEY_PRIVATE>, <ENV_KEY_PUBLIC>]
    private_value: "<SECRET>"
    public_value: <safe-to-embed-public-value>
    issued_at: <YYYY-MM-DD>
    next_due: <YYYY-MM-DD>
    notes: |
      Private values must never leave secure storage.
      Public values may be embedded in client-facing config but are
      still treated as configuration, not as credentials.

ops_automation:
  internal_api_key: "<SECRET>"
  admin_api_key: "<SECRET>"
  base_url: <https://internal.example.invalid>
  state_db_paths:
    - <path/to/state.sqlite>
    - <path/to/sessions.sqlite>

users_for_testing:
  # Optional. Test accounts used for smoke checks. Never list real customer data.
  - email: <test@example.invalid>
    role: <e.g. smoke-test>
    notes: <how this account is provisioned>

# ---------------------------------------------------------------------------
# Audit retention
# ---------------------------------------------------------------------------

revoked:
  # Do not delete revoked entries. Keep them for audit trail.
  - env_key: <ENV_KEY_NAME>
    revoked_at: <YYYY-MM-DDTHH:MM:SSZ>
    reason: <one-line reason>
    revoked: true

notes:
  - Keep this file encrypted and out of git.
  - Rotate credentials on the cadence defined in their rotation runbook.
  - Record rotation date in the relevant section.
  - Never email plaintext inventories. Use a secure vault link or SSH to retrieve on demand.
