name: gates

# Advisory CI: runs the devtopology gates on every push / PR.
# This repo is GitHub free + private with no required status checks, so a red
# result does NOT block merge — its value is an objective health record on the PR.
# The task policy requires running `make verify` + `make health` locally before
# push; this job backstops environment differences (and validates lowercase
# paths on a case-sensitive Linux runner).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: structure + semantic gates
        run: make verify
      - name: health summary
        run: make health

  # Offline data-pipeline check: the real ingest needs api.nasdaq.com + Yahoo,
  # which CI cannot reach, so the M0/M1 compute + export path had NO CI coverage.
  # The synthetic fixture (compute/fixture.py) closes that gap deterministically.
  offline-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: install product deps
        run: pip install -r requirements.txt
      - name: fixture -> compute -> valuation -> export -> acceptance
        run: |
          make fixture-pipeline
          python3 export/board.py
          make check
      - name: upload sample board.json
        uses: actions/upload-artifact@v7
        with:
          name: board-json-sample
          path: web/public/data/board.json
          if-no-files-found: error
