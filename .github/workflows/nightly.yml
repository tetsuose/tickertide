name: nightly

# EOD data pipeline (D.2 + D.3, ROADMAP D 轨): real ingest -> compute -> export ->
# static build -> artifact -> deploy. The static client is worthless without fresh
# nightly data, so this runs the REAL pipeline (D.1 proved the free sources reachable
# from a real host; this job validates they're also reachable from a GitHub-hosted
# runner — the open risk gate.yml flagged), uploads the built site + data artifact, and
# then publishes it to Cloudflare Pages (D.3 — production is public; optional preview
# protection is enforced out-of-band by Cloudflare Access). The deploy step self-skips until the CLOUDFLARE_API_TOKEN secret is
# set, so this workflow is safe to run before go-live. Deploy runs only after the
# pipeline + C9 gates + web build succeed (a failed step stops the job first), so
# stale/failed data is never published. Secrets: the deploy token lives ONLY in a GitHub
# Actions secret (see docs/runtime/Credentials-Management.md) — EDGAR UA is a descriptive
# UA in ingest/edgar.py, data sources are public endpoints, artifact upload uses the
# built-in GITHUB_TOKEN. engine/index.py stays stdlib-only; only product deps
# (requirements.txt) are installed. Go-live + auto-deploy enablement = hard stop (user nod).

on:
  schedule:
    # ~07:00 UTC Tue–Sat = ~02:00–03:00 ET the morning after each Mon–Fri close (EOD
    # data settled; DST shifts ET ±1h — fine for an overnight run). Adjust freely.
    - cron: "0 7 * * 2-6"
  workflow_dispatch:
    inputs:
      limit:
        description: "top-N by mktcap for bars (D.1 AC ≥500; pass a small value for a quick smoke)"
        default: "500"
        required: false

permissions:
  contents: read

concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: install product deps (engine/index.py stays stdlib-only)
        run: pip install -r requirements.txt

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: web deps
        run: cd web && npm ci

      - name: real pipeline (ingest+sector_etf -> fundamentals -> themes -> compute -> check)
        run: make pipeline PIPELINE_ARGS="--limit ${{ github.event.inputs.limit || '500' }}"

      - name: export (board + ocean + rotation + theme)
        run: make export

      - name: cross-surface C9 (rotation + theme + ocean ↔ board)
        run: |
          make rotation-c9
          make theme-c9
          make ocean-c9

      - name: web build (static dist, data bundled from public/data)
        run: cd web && npm run build

      - name: upload site + data artifact
        uses: actions/upload-artifact@v7
        with:
          name: tickertide-site
          path: |
            web/dist
            web/public/data
          if-no-files-found: error
          retention-days: 7

      # D.3: publish web/dist to Cloudflare Pages (production, public). The gate step
      # checks the secret WITHOUT printing it (echoes only a boolean); the deploy step
      # self-skips when CLOUDFLARE_API_TOKEN is unset so this is safe pre-go-live. Auth +
      # account come from secrets via env (wrangler reads them); never interpolated into
      # the run script. wrangler.jsonc (web/) carries name + output dir. --branch=main =>
      # production deploy. Access policy, if any, is out-of-band — see Deploy-Pages-Runbook.md.
      - name: detect deploy secret (no value printed)
        id: deploy_gate
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "CLOUDFLARE_API_TOKEN unset — skipping Cloudflare Pages deploy (artifact still uploaded)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: deploy to Cloudflare Pages (production, public)
        if: steps.deploy_gate.outputs.enabled == 'true'
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy --branch=main
